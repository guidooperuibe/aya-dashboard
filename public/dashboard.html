<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AYA Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --cream: #FAF7F2;
    --ink: #1C1917;
    --ink-light: #44403C;
    --line: #D6D0C8;
    --accent: #C9A84C;
    --red: #C0392B;
  }

  body {
    background: var(--cream);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 27px, rgba(0,0,0,.03) 28px),
      repeating-linear-gradient(90deg, transparent, transparent 27px, rgba(0,0,0,.02) 28px);
    pointer-events: none; z-index: 0;
  }

  .container {
    display: flex;
    width: 900px;
    min-height: 560px;
    position: relative;
    z-index: 1;
  }

  .left {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px;
    position: relative;
  }

  .brand {
    position: absolute;
    top: 32px; left: 40px;
  }
  .brand-name {
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    letter-spacing: 4px;
    color: var(--ink);
    text-transform: uppercase;
  }
  .brand-line {
    width: 40px; height: 2px;
    background: var(--accent);
    margin-top: 4px;
  }

  .drawing-wrap {
    width: 280px;
    height: 280px;
  }

  .student-svg {
    width: 100%;
    height: 100%;
    overflow: visible;
  }

  .student-svg path,
  .student-svg circle,
  .student-svg line,
  .student-svg ellipse,
  .student-svg rect {
    fill: none;
    stroke: var(--ink);
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .draw {
    stroke-dashoffset: var(--len);
    stroke-dasharray: var(--len);
    animation: draw var(--dur, 0.6s) var(--delay, 0s) cubic-bezier(.4,0,.2,1) forwards;
  }

  @keyframes draw { to { stroke-dashoffset: 0; } }

  .accent-stroke { stroke: var(--accent); stroke-width: 2.2; }
  .thin-stroke { stroke-width: 1.2; stroke: var(--ink-light); }

  .caption {
    margin-top: 20px;
    font-size: 11px;
    letter-spacing: 2.5px;
    color: var(--ink-light);
    text-transform: uppercase;
    opacity: 0;
    animation: fadeIn 0.6s 3.8s forwards;
  }
  @keyframes fadeIn { to { opacity: 1; } }

  .corner-decoration {
    position: absolute;
    bottom: 32px; left: 40px;
    display: flex; gap: 5px; align-items: center;
  }
  .corner-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); }
  .corner-dot:nth-child(2) { opacity: .5; }
  .corner-dot:nth-child(3) { opacity: .25; }

  .divider {
    width: 1px;
    background: var(--line);
    margin: 40px 0;
    position: relative;
  }
  .divider::before {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
  }

  .right {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 40px 48px;
    opacity: 0;
    transform: translateX(20px);
    animation: slideIn 0.7s 1s cubic-bezier(.4,0,.2,1) forwards;
  }
  @keyframes slideIn { to { opacity: 1; transform: translateX(0); } }

  .login-title {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    color: var(--ink);
    line-height: 1.2;
    margin-bottom: 6px;
  }
  .login-sub {
    font-size: 13px;
    color: var(--ink-light);
    margin-bottom: 40px;
    font-weight: 300;
  }

  .field { margin-bottom: 24px; }
  .field label {
    display: block;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--ink-light);
    margin-bottom: 8px;
    font-weight: 500;
  }
  .field input {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1.5px solid var(--line);
    padding: 10px 0;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--ink);
    outline: none;
    transition: border-color .2s;
  }
  .field input:focus { border-bottom-color: var(--accent); }
  .field input::placeholder { color: var(--line); }

  .btn-enter {
    margin-top: 36px;
    width: 100%;
    padding: 14px;
    background: var(--ink);
    color: var(--cream);
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    transition: background .2s, transform .15s;
    position: relative;
    overflow: hidden;
  }
  .btn-enter::after {
    content: '';
    position: absolute; inset: 0;
    background: var(--accent);
    transform: translateX(-100%);
    transition: transform .3s cubic-bezier(.4,0,.2,1);
  }
  .btn-enter:hover::after { transform: translateX(0); }
  .btn-enter span { position: relative; z-index: 1; }
  .btn-enter:hover { transform: translateY(-1px); }
  .btn-enter:active { transform: translateY(0); }

  .error {
    margin-top: 14px;
    font-size: 12px;
    color: var(--red);
    display: none;
    text-align: center;
  }
</style>
</head>
<body>
<div class="container">

  <div class="left">
    <div class="brand">
      <div class="brand-name">AYA Dashboard</div>
      <div class="brand-line"></div>
    </div>

    <div class="drawing-wrap">
      <svg class="student-svg" viewBox="0 0 200 230" xmlns="http://www.w3.org/2000/svg">

        <!-- Mesa -->
        <line class="draw" style="--len:160;--dur:0.5s;--delay:0.1s" x1="20" y1="162" x2="180" y2="162"/>
        <line class="draw" style="--len:32;--dur:0.3s;--delay:0.55s" x1="30" y1="162" x2="30" y2="196"/>
        <line class="draw" style="--len:32;--dur:0.3s;--delay:0.6s" x1="170" y1="162" x2="170" y2="196"/>

        <!-- Livro aberto na mesa -->
        <rect class="draw accent-stroke" style="--len:200;--dur:0.6s;--delay:0.2s" x="58" y="148" width="50" height="14" rx="1"/>
        <line class="draw accent-stroke" style="--len:14;--dur:0.2s;--delay:0.75s" x1="83" y1="148" x2="83" y2="162"/>
        <line class="draw thin-stroke" style="--len:18;--dur:0.2s;--delay:0.85s" x1="63" y1="153" x2="79" y2="153"/>
        <line class="draw thin-stroke" style="--len:18;--dur:0.2s;--delay:0.95s" x1="63" y1="157" x2="79" y2="157"/>
        <line class="draw thin-stroke" style="--len:18;--dur:0.2s;--delay:0.85s" x1="87" y1="153" x2="103" y2="153"/>
        <line class="draw thin-stroke" style="--len:18;--dur:0.2s;--delay:0.95s" x1="87" y1="157" x2="103" y2="157"/>

        <!-- Cadeira -->
        <line class="draw" style="--len:52;--dur:0.3s;--delay:0.7s" x1="74" y1="188" x2="126" y2="188"/>
        <line class="draw" style="--len:30;--dur:0.25s;--delay:0.9s" x1="80" y1="188" x2="80" y2="218"/>
        <line class="draw" style="--len:30;--dur:0.25s;--delay:0.9s" x1="120" y1="188" x2="120" y2="218"/>
        <line class="draw" style="--len:52;--dur:0.3s;--delay:1.1s" x1="74" y1="218" x2="126" y2="218"/>

        <!-- Corpo -->
        <path class="draw" style="--len:90;--dur:0.5s;--delay:1.2s"
          d="M100 132 C84 132 74 142 74 157 L74 188 L126 188 L126 157 C126 142 116 132 100 132"/>

        <!-- Pescoço -->
        <line class="draw" style="--len:16;--dur:0.2s;--delay:1.65s" x1="100" y1="116" x2="100" y2="132"/>

        <!-- Cabeça -->
        <circle class="draw" style="--len:126;--dur:0.7s;--delay:1.8s" cx="100" cy="100" r="20"/>

        <!-- Cabelo -->
        <path class="draw thin-stroke" style="--len:85;--dur:0.5s;--delay:2.4s"
          d="M81 99 C81 84 90 77 100 77 C110 77 119 84 119 99"/>
        <path class="draw thin-stroke" style="--len:18;--dur:0.2s;--delay:2.8s"
          d="M81 99 C79 93 79 86 82 81"/>

        <!-- Olhos -->
        <line class="draw" style="--len:6;--dur:0.15s;--delay:2.95s" x1="94" y1="99" x2="94" y2="105"/>
        <line class="draw" style="--len:6;--dur:0.15s;--delay:3.05s" x1="106" y1="99" x2="106" y2="105"/>

        <!-- Sorriso -->
        <path class="draw" style="--len:12;--dur:0.2s;--delay:3.15s" d="M96 110 Q100 114 104 110"/>

        <!-- Braços -->
        <path class="draw" style="--len:80;--dur:0.45s;--delay:1.3s"
          d="M120 140 L142 150 L132 160 L92 160"/>
        <path class="draw" style="--len:65;--dur:0.4s;--delay:1.4s"
          d="M80 140 L64 150 L70 160 L92 160"/>

        <!-- Lápis na mão direita -->
        <line class="draw accent-stroke" style="--len:30;--dur:0.3s;--delay:3.25s"
          x1="126" y1="155" x2="148" y2="142"/>
        <path class="draw accent-stroke" style="--len:10;--dur:0.15s;--delay:3.5s"
          d="M148 142 L151 137 L146 140 Z"/>

        <!-- Estrelinhas decorativas -->
        <path class="draw thin-stroke" style="--len:22;--dur:0.25s;--delay:3.6s"
          d="M158 72 L160 66 L162 72 L168 74 L162 76 L160 82 L158 76 L152 74 Z"/>
        <path class="draw thin-stroke" style="--len:15;--dur:0.2s;--delay:3.75s"
          d="M40 62 L41 58 L42 62 L46 63 L42 64 L41 68 L40 64 L36 63 Z"/>
        <circle class="draw accent-stroke" style="--len:16;--dur:0.2s;--delay:3.9s"
          cx="156" cy="48" r="2.5"/>

      </svg>
    </div>

    <div class="caption">Sistema de Gestão Escolar</div>

    <div class="corner-decoration">
      <div class="corner-dot"></div>
      <div class="corner-dot"></div>
      <div class="corner-dot"></div>
    </div>
  </div>

  <div class="divider"></div>

  <div class="right">
    <div class="login-title">Bem-vindo<br>de volta.</div>
    <div class="login-sub">Entre com suas credenciais para acessar</div>

    <div class="field">
      <label>Usuário</label>
      <input type="text" id="loginUser" placeholder="ex: gestao01" autocomplete="username">
    </div>

    <div class="field">
      <label>Senha</label>
      <input type="password" id="loginPwd" placeholder="••••••••" autocomplete="current-password"
        onkeydown="if(event.key==='Enter') doLogin()">
    </div>

    <button class="btn-enter" onclick="doLogin()">
      <span>Entrar</span>
    </button>

    <div class="error" id="loginErr">Usuário ou senha incorretos.</div>
  </div>

</div>

<script>
const DEFAULT_SRV = 'https://aya-dashboard.onrender.com';
function srv(){ return localStorage.getItem('aya_srv') || DEFAULT_SRV; }

async function doLogin(){
  const u = document.getElementById('loginUser').value.trim();
  const pw = document.getElementById('loginPwd').value;
  const err = document.getElementById('loginErr');
  const btn = document.querySelector('.btn-enter');
  err.style.display = 'none';
  if(!u || !pw){
    err.textContent = 'Preencha usuário e senha.';
    err.style.display = 'block';
    return;
  }
  btn.disabled = true;
  btn.querySelector('span').textContent = 'Aguarde...';
  try {
    const res = await fetch(`${srv()}/login`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({usuario: u, senha: pw})
    });
    const d = await res.json();
    if(!d.ok) throw new Error(d.error || 'Erro');
    localStorage.setItem('aya_token', d.token);
    localStorage.setItem('aya_perfil', d.perfil);
    localStorage.setItem('aya_nome', d.nome);
    // Redirecionar para painel (a ser construído)
    window.location.href = 'painel.html';
  } catch(e) {
    err.textContent = e.message || 'Erro ao conectar.';
    err.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.querySelector('span').textContent = 'Entrar';
  }
}
</script>
</body>
</html>
