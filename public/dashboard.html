<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AYA Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --cream:     #FAF7F2;
  --white:     #FFFFFF;
  --ink:       #1C1917;
  --ink-light: #44403C;
  --muted:     #78716C;
  --line:      #E7E2DA;
  --accent:    #C9A84C;
  --green:     #4A9B7F;
  --red:       #C0392B;
  --sidebar:   220px;
}

body {
  background:var(--cream);
  font-family:'DM Sans',sans-serif;
  color:var(--ink);
  min-height:100vh;
}

body::before {
  content:''; position:fixed; inset:0;
  background-image:repeating-linear-gradient(0deg,transparent,transparent 27px,rgba(0,0,0,.025) 28px);
  pointer-events:none; z-index:0;
}

/* ── LOADING ── */
.loading-overlay {
  position:fixed; inset:0;
  background:rgba(250,247,242,.95);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:16px; z-index:999;
}
.loading-dots { display:flex; gap:6px; }
.loading-dot {
  width:8px; height:8px; border-radius:50%;
  animation:bounce .8s ease-in-out infinite;
}
.loading-dot:nth-child(1){ background:var(--accent); animation-delay:0s; }
.loading-dot:nth-child(2){ background:var(--ink-light); animation-delay:.15s; }
.loading-dot:nth-child(3){ background:var(--accent); animation-delay:.3s; }
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
.loading-text { font-size:12px; letter-spacing:2px; color:var(--muted); text-transform:uppercase; }

/* ════════════════════════════
   LOGIN
════════════════════════════ */
#loginScreen {
  min-height:100vh; display:flex;
  align-items:center; justify-content:center;
  position:relative; z-index:1;
}

.login-container {
  display:flex; width:900px; min-height:560px;
}

/* Lado esquerdo */
.login-left {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:40px; position:relative;
}
.brand { position:absolute; top:32px; left:40px; }
.brand-name {
  font-family:'Playfair Display',serif;
  font-size:13px; letter-spacing:4px;
  color:var(--ink); text-transform:uppercase;
}
.brand-line { width:40px; height:2px; background:var(--accent); margin-top:4px; }

.drawing-wrap { width:280px; height:280px; }
.student-svg { width:100%; height:100%; overflow:visible; }
.student-svg path, .student-svg circle,
.student-svg line, .student-svg rect {
  fill:none; stroke:var(--ink);
  stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round;
}
.draw {
  stroke-dashoffset:var(--len); stroke-dasharray:var(--len);
  animation:draw var(--dur,.6s) var(--delay,0s) cubic-bezier(.4,0,.2,1) forwards;
}
@keyframes draw { to { stroke-dashoffset:0; } }
.acc { stroke:var(--accent); stroke-width:2.2; }
.thin { stroke-width:1.2; stroke:var(--ink-light); }

.caption {
  margin-top:20px; font-size:11px; letter-spacing:2.5px;
  color:var(--muted); text-transform:uppercase;
  opacity:0; animation:fadeIn .6s 3.8s forwards;
}
@keyframes fadeIn { to { opacity:1; } }

.corner-dec { position:absolute; bottom:32px; left:40px; display:flex; gap:5px; }
.cdot { width:5px; height:5px; border-radius:50%; background:var(--accent); }
.cdot:nth-child(2){ opacity:.5; } .cdot:nth-child(3){ opacity:.25; }

/* Divisor */
.login-div {
  width:1px; background:var(--line); margin:40px 0; position:relative;
}
.login-div::before {
  content:''; position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
  width:6px; height:6px; border-radius:50%; background:var(--accent);
}

/* Lado direito */
.login-right {
  flex:1; display:flex; flex-direction:column;
  justify-content:center; padding:40px 48px;
  opacity:0; transform:translateX(20px);
  animation:slideIn .7s 1s cubic-bezier(.4,0,.2,1) forwards;
}
@keyframes slideIn { to { opacity:1; transform:translateX(0); } }

.login-title {
  font-family:'Playfair Display',serif;
  font-size:32px; color:var(--ink); line-height:1.2; margin-bottom:6px;
}
.login-sub { font-size:13px; color:var(--muted); margin-bottom:40px; font-weight:300; }

.field { margin-bottom:24px; }
.field label {
  display:block; font-size:10px; letter-spacing:2px;
  text-transform:uppercase; color:var(--muted);
  margin-bottom:8px; font-weight:500;
}
.field input {
  width:100%; background:transparent;
  border:none; border-bottom:1.5px solid var(--line);
  padding:10px 0; font-family:'DM Sans',sans-serif;
  font-size:15px; color:var(--ink); outline:none; transition:border-color .2s;
}
.field input:focus { border-bottom-color:var(--accent); }
.field input::placeholder { color:var(--line); }

.btn-enter {
  margin-top:36px; width:100%; padding:14px;
  background:var(--ink); color:var(--cream); border:none;
  font-family:'DM Sans',sans-serif; font-size:13px;
  letter-spacing:3px; text-transform:uppercase;
  cursor:pointer; transition:transform .15s; position:relative; overflow:hidden;
}
.btn-enter::after {
  content:''; position:absolute; inset:0;
  background:var(--accent); transform:translateX(-100%);
  transition:transform .3s cubic-bezier(.4,0,.2,1);
}
.btn-enter:hover::after { transform:translateX(0); }
.btn-enter span { position:relative; z-index:1; }
.btn-enter:hover { transform:translateY(-1px); }

.login-error {
  margin-top:14px; font-size:12px; color:var(--red);
  display:none; text-align:center;
}

/* ════════════════════════════
   PAINEL
════════════════════════════ */
#painelScreen { display:none; position:relative; z-index:1; }

/* Topbar */
.topbar {
  position:fixed; top:0; left:0; right:0; height:56px;
  background:var(--ink); display:flex; align-items:center;
  padding:0 24px; gap:14px; z-index:200;
}
.topbar-brand {
  font-family:'Playfair Display',serif;
  font-size:14px; letter-spacing:3px; color:#fff; text-transform:uppercase;
}
.topbar-dot { width:4px; height:4px; border-radius:50%; background:var(--accent); }
.topbar-user { font-size:12px; color:#94908A; margin-left:auto; font-weight:300; }
.topbar-sair {
  background:none; border:1px solid rgba(255,255,255,.15); color:#94908A;
  border-radius:6px; padding:5px 12px; font-family:'DM Sans',sans-serif;
  font-size:11px; letter-spacing:1px; text-transform:uppercase;
  cursor:pointer; transition:all .2s;
}
.topbar-sair:hover { border-color:var(--accent); color:var(--accent); }

/* Sidebar */
.sidebar {
  position:fixed; top:56px; left:0; bottom:0;
  width:var(--sidebar); background:var(--ink);
  padding:28px 0; z-index:100;
  border-right:1px solid rgba(255,255,255,.06);
}
.nav-label {
  font-size:9px; letter-spacing:2.5px; color:#57534E;
  text-transform:uppercase; padding:0 24px; margin-bottom:8px;
}
.nav-item {
  display:flex; align-items:center; gap:12px;
  padding:11px 24px; cursor:pointer; font-size:13px;
  color:#78716C; border:none; background:none;
  width:100%; text-align:left; transition:all .15s; position:relative;
}
.nav-item:hover { color:#E7E2DA; }
.nav-item.active { color:#FFFFFF; }
.nav-item.active::before {
  content:''; position:absolute; left:0; top:20%; bottom:20%;
  width:3px; background:var(--accent); border-radius:0 3px 3px 0;
}
.nav-icon { font-size:15px; width:18px; text-align:center; }

/* Main */
.main { margin-left:var(--sidebar); padding:80px 32px 40px; }

.page-header { margin-bottom:28px; }
.page-title { font-family:'Playfair Display',serif; font-size:28px; color:var(--ink); }
.page-sub { font-size:13px; color:var(--muted); margin-top:5px; font-weight:300; }

/* KPIs */
.kpi-row { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-bottom:24px; }
.kpi-card {
  background:var(--white); border:1.5px solid var(--line);
  border-radius:12px; padding:22px 24px;
  position:relative; overflow:hidden;
  animation:fadeUp .4s ease both;
}
.kpi-card::after {
  content:''; position:absolute; bottom:0; left:0; right:0; height:3px;
  background:var(--card-color, var(--accent));
}
@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.kpi-label { font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); font-weight:500; margin-bottom:10px; display:flex; align-items:center; justify-content:space-between; }
.kpi-value { font-family:'Playfair Display',serif; font-size:38px; color:var(--ink); line-height:1; }
.kpi-detail { font-size:12px; color:var(--muted); margin-top:6px; font-weight:300; }
.kpi-date-sel {
  background:var(--cream); border:1px solid var(--line);
  border-radius:6px; padding:3px 8px;
  font-family:'DM Sans',sans-serif; font-size:10px; color:var(--muted);
  outline:none; cursor:pointer; letter-spacing:0; text-transform:none;
}
.kpi-date-sel:focus { border-color:var(--green); }

/* Grid */
.grid2 { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:20px; }

/* Panel */
.panel {
  background:var(--white); border:1.5px solid var(--line);
  border-radius:12px; padding:22px 24px;
  animation:fadeUp .4s ease both; margin-bottom:20px;
}
.panel-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; }
.panel-title { font-size:13px; font-weight:600; color:var(--ink); }

.date-select {
  background:var(--cream); border:1.5px solid var(--line);
  border-radius:8px; padding:6px 12px;
  font-family:'DM Sans',sans-serif; font-size:12px; color:var(--ink);
  outline:none; cursor:pointer; transition:border-color .2s;
}
.date-select:focus { border-color:var(--accent); }

/* Barras sala */
.sala-bar-row { display:grid; grid-template-columns:32px 1fr 36px; align-items:center; gap:10px; margin-bottom:10px; }
.sala-bar-label { font-size:12px; font-weight:600; color:var(--ink-light); }
.sala-bar-track { background:var(--cream); border-radius:6px; height:26px; overflow:hidden; }
.sala-bar-fill {
  height:100%; border-radius:6px;
  display:flex; align-items:center; padding:0 10px;
  font-size:11px; font-weight:600; color:#fff;
  transition:width .8s cubic-bezier(.4,0,.2,1);
}
.sala-bar-num { font-size:11px; color:var(--muted); text-align:right; }
.chart-wrap { position:relative; height:240px; }

/* Responsivo */
@media(max-width:700px){
  .login-left { display:none; }
  .login-right { width:100%; padding:48px 24px; }
  .login-div { display:none; }
  .login-container { width:100%; min-height:100vh; }
  .sidebar { display:none; }
  .main { margin-left:0; padding:76px 16px 32px; }
  .kpi-row { grid-template-columns:1fr 1fr; }
  .grid2 { grid-template-columns:1fr; }
}
</style>
</head>

  {label:'13/03',fid:'fld4uHPMwl3eBKGvc',nome:'13/3'},
  {label:'16/03',fid:'fld5qQxd5WQ8VuuPZ',nome:'16/3'},
  {label:'17/03',fid:'fldVRiTrWKfaveTvA',nome:'17/3'},
  {label:'18/03',fid:'fldXYAdZfDsemNsav',nome:'18/3'},
  {label:'19/03',fid:'fldcp22tZjlosokoK',nome:'19/3'},
];
const SALAS = ['6A','6B','7A','7B','8A','8B','9A','9B'];
const CORES = ['#3B82F6','#22C55E','#EF4444','#EAB308','#8B5CF6','#F97316','#14B8A6','#6366F1'];

let token = null, allAlunos = [], chartGenero = null, chartFreq = null;

function srv(){ return localStorage.getItem('aya_srv') || DEFAULT_SRV; }

// ── LOGIN ──
async function doLogin(){
  const u = document.getElementById('loginUser').value.trim();
  const pw = document.getElementById('loginPwd').value;
  const err = document.getElementById('loginErr');
  const btn = document.getElementById('loginBtn');
  err.style.display = 'none';
  if(!u || !pw){ err.textContent='Preencha usuário e senha.'; err.style.display='block'; return; }
  btn.disabled = true;
  btn.querySelector('span').textContent = 'Aguarde...';
  try {
    const res = await fetch(`${srv()}/login`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({usuario:u, senha:pw})
    });
    const d = await res.json();
    if(!d.ok) throw new Error(d.error || 'Erro');
    token = d.token;
    document.getElementById('topUser').textContent = d.nome;
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('painelScreen').style.display = 'block';
    loadData();
  } catch(e) {
    err.textContent = e.message || 'Erro ao conectar.';
    err.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.querySelector('span').textContent = 'Entrar';
  }
}

function sair(){
  token = null; allAlunos = [];
  document.getElementById('painelScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('loginUser').value = '';
  document.getElementById('loginPwd').value = '';
}

// ── CARREGAR DADOS ──
async function loadData(){
  document.getElementById('loadOverlay').style.display = 'flex';
  try {
    let records = [], offset = null;
    do {
      const url = `${srv()}/api/data/tblKcFjBKyQYPew8i${offset?'?offset='+offset:''}`;
      const r = await fetch(url, {headers:{'x-token':token}});
      if(r.status === 401){ sair(); return; }
      const d = await r.json();
      records = records.concat(d.records || []);
      offset = d.offset || null;
    } while(offset);

    console.log('Total registros recebidos:', records.length);
    if(records.length > 0) console.log('Primeiro registro:', JSON.stringify(records[0]).substring(0,200));
    allAlunos = records.map(r => {
      const f = r.fields || r.cellValuesByFieldId || {};
      const gs = k => {
        const v = f[k];
        if(v === null || v === undefined || v === '') return '';
        if(typeof v === 'object') return v.name || '';
        return String(v).trim();
      };
      const sed = gs('SED');
      if(sed === 'TR' || sed === 'BX TR' || sed === 'NCOM' || sed === 'REM') return null;
      const name = gs('Name').replace(/\n/g,'').trim();
      if(!name) return null;
      const base = { name, sala: gs('SALAS'), sexo: gs('SEXO') };
      // Guardar valor de cada data usando o NOME do campo (ex: "19/3")
      // E também pelo fieldId como chave para o seletor funcionar
      DATAS.forEach(d => {
        const v = f[d.nome] !== undefined ? f[d.nome] : f[d.fid];
        if(v === null || v === undefined) { base[d.fid] = '0'; return; }
        base[d.fid] = typeof v === 'object' ? (v.name || '0') : String(v).trim();
      });
      return base;
    }).filter(Boolean);

    renderAll();
  } catch(e) {
    console.error(e);
  } finally {
    document.getElementById('loadOverlay').style.display = 'none';
  }
}

function getUltimaData(){
  for(let i=DATAS.length-1;i>=0;i--){
    if(allAlunos.some(a=>a[DATAS[i].fid]==='1')) return DATAS[i];
  }
  return DATAS[DATAS.length-1];
}

function renderAll(){
  const total = allAlunos.length;
  const ultima = getUltimaData();
  const faltas = ultima ? allAlunos.filter(a=>a[ultima.fid]==='1').length : 0;
  const presentes = total - faltas;
  const pct = total > 0 ? Math.round((presentes/total)*100) : 0;

  document.getElementById('kpiTotal').textContent = total;
  document.getElementById('kpiPresentes').textContent = presentes;
  document.getElementById('kpiPresentesDet').textContent = `${pct}% — ${ultima?.label||''}`;
  document.getElementById('kpiFaltas').textContent = faltas;
  document.getElementById('kpiFaltasDet').textContent = `${100-pct}% dos alunos`;

  // Barras por sala
  const porSala = {};
  SALAS.forEach(s => porSala[s]=0);
  allAlunos.forEach(a => { if(porSala[a.sala]!==undefined) porSala[a.sala]++; });
  const max = Math.max(...Object.values(porSala), 1);
  document.getElementById('barSalas').innerHTML = SALAS.map((s,i) => {
    const n = porSala[s]||0;
    return `<div class="sala-bar-row">
      <div class="sala-bar-label">${s}</div>
      <div class="sala-bar-track">
        <div class="sala-bar-fill" style="width:${Math.round(n/max*100)}%;background:${CORES[i]}">${n}</div>
      </div>
      <div class="sala-bar-num">${n}</div>
    </div>`;
  }).join('');

  // Pizza gênero
  const masc = allAlunos.filter(a=>a.sexo==='MASCULINO').length;
  const fem  = allAlunos.filter(a=>a.sexo==='FEMININO').length;
  if(chartGenero) chartGenero.destroy();
  chartGenero = new Chart(document.getElementById('chartGenero'), {
    type:'doughnut',
    data:{ labels:['Masculino','Feminino'], datasets:[{ data:[masc,fem], backgroundColor:['#1C1917','#C9A84C'], borderWidth:0, hoverOffset:6 }] },
    options:{ responsive:true, maintainAspectRatio:false, cutout:'68%',
      plugins:{ legend:{ position:'bottom', labels:{ font:{family:'DM Sans',size:12}, color:'#44403C', padding:16 } } }
    }
  });

  // Seletor datas principal
  const sel = document.getElementById('dataSel');
  sel.innerHTML = '<option value="">Selecione uma data</option>';
  DATAS.forEach(d => { sel.innerHTML += `<option value="${d.fid}">${d.label}</option>`; });
  if(ultima){ sel.value = ultima.fid; renderFreqChart(); }

  // Seletor datas do KPI
  const kpiSel = document.getElementById('kpiDataSel');
  kpiSel.innerHTML = '';
  DATAS.forEach(d => { kpiSel.innerHTML += `<option value="${d.fid}">${d.label}</option>`; });
  if(ultima) kpiSel.value = ultima.fid;
}

function atualizarKPIs(){
  const fid = document.getElementById('kpiDataSel').value;
  if(!fid || !allAlunos.length) return;
  const total = allAlunos.length;
  const faltas = allAlunos.filter(a => a[fid] === '1').length;
  const presentes = total - faltas;
  const pct = total > 0 ? Math.round((presentes/total)*100) : 0;
  const data = DATAS.find(d => d.fid === fid);
  document.getElementById('kpiPresentes').textContent = presentes;
  document.getElementById('kpiPresentesDet').textContent = `${pct}% — ${data?.label||''}`;
  document.getElementById('kpiFaltas').textContent = faltas;
  document.getElementById('kpiFaltasDet').textContent = `${100-pct}% dos alunos`;
  // Sincronizar com o gráfico
  document.getElementById('dataSel').value = fid;
  renderFreqChart();
}

function renderFreqChart(){
  const fid = document.getElementById('dataSel').value;
  if(!fid) return;
  const presentes = SALAS.map(s => allAlunos.filter(a=>a.sala===s && a[fid]!=='1').length);
  const faltas    = SALAS.map(s => allAlunos.filter(a=>a.sala===s && a[fid]==='1').length);
  if(chartFreq) chartFreq.destroy();
  chartFreq = new Chart(document.getElementById('chartFreq'), {
    type:'bar',
    data:{ labels:SALAS, datasets:[
      { label:'Presentes', data:presentes, backgroundColor:'#1C1917', borderRadius:6 },
      { label:'Faltas',    data:faltas,    backgroundColor:'#C9A84C', borderRadius:6 },
    ]},
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ position:'bottom', labels:{ font:{family:'DM Sans',size:12}, color:'#44403C', padding:16 } } },
      scales:{
        x:{ grid:{display:false}, ticks:{font:{family:'DM Sans',size:12},color:'#78716C'} },
        y:{ grid:{color:'#E7E2DA'}, ticks:{font:{family:'DM Sans',size:11},color:'#78716C'} }
      }
    }
  });
}
</script>
